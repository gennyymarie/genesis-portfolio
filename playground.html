<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun — Genesis Gonzalez</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #fff;
  --off: #f5f5f3;
  --ink: #111;
  --mid: #767676;
  --border: #e6e6e4;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #fff;
  font-family: 'DM Sans', sans-serif;
  cursor: none;
}

/* CURSOR */
.cursor {
  width: 8px; height: 8px;
  background: #111;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  mix-blend-mode: difference;
}

/* NAV */
nav {
  position: relative; z-index: 400;
  padding: 18px 52px;
  display: flex; justify-content: space-between; align-items: center;
  background: transparent;
}
.nav-name { font-size: 0.88rem; font-weight: 300; text-decoration: none; color: var(--ink); }
.nav-links { display: flex; gap: 32px; list-style: none; }
.nav-links a { font-size: 0.88rem; color: var(--ink); font-weight: 300; text-decoration: none; transition: opacity 0.18s; }
.nav-links a:hover { opacity: 0.5; }
.nav-links a.active { text-decoration: underline; text-underline-offset: 4px; }
.nav-links a.dim { color: var(--mid); }

/* CANVAS WRAP */
.canvas-wrap {
  position: fixed; inset: 0; overflow: hidden;
  background: #fff;
}
.canvas-wrap.grid-mode {
  overflow-y: auto;
  overflow-x: hidden;
}
.canvas-wrap::-webkit-scrollbar { display: none; }
.canvas { position: relative; width: 100%; min-height: 100vh; }

/* CARDS */
.card {
  position: absolute; left: 0; top: 0;
  border-radius: 4px; overflow: hidden;
  box-shadow: 0 6px 24px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.08);
  cursor: none;
  transition: transform 0.7s cubic-bezier(0.34,1.12,0.64,1),
              width 0.7s cubic-bezier(0.34,1.12,0.64,1),
              height 0.7s cubic-bezier(0.34,1.12,0.64,1),
              box-shadow 0.25s ease, opacity 0.38s ease;
  will-change: transform;
}
.card.is-dragging {
  box-shadow: 0 22px 64px rgba(0,0,0,0.26);
  z-index: 500 !important;
  transition: box-shadow 0.2s, opacity 0.2s;
}
.card-face { width: 100%; height: 100%; display: block; }
/* No hover labels — visuals only */
body.grid-mode .card { border-radius: 4px; cursor: none; }

/* TOGGLE BUTTON */
.toggle-btn {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  background: var(--ink); color: #fff;
  border: none; border-radius: 100px;
  padding: 11px 24px;
  font-size: 0.78rem; font-family: 'DM Sans', sans-serif;
  font-weight: 400; letter-spacing: 0.04em; cursor: none;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.2s;
  white-space: nowrap;
}
.toggle-btn:hover { background: #2a2a2a; }

/* POPUP */
.overlay {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.overlay.open { opacity: 1; pointer-events: all; }
.popup {
  background: var(--white); border-radius: 20px;
  width: 100%; max-width: 580px; max-height: 90vh;
  overflow: hidden; display: flex; flex-direction: column;
  transform: translateY(18px) scale(0.97); opacity: 0;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease;
  box-shadow: 0 28px 80px rgba(0,0,0,0.2);
}
.overlay.open .popup { transform: none; opacity: 1; }

.popup-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 22px 14px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.popup-bar-cat {
  font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--mid); display: block; margin-bottom: 3px;
}
.popup-bar-name { font-size: 1rem; font-weight: 600; color: var(--ink); }
.popup-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--off); border: none; cursor: none;
  font-size: 0.82rem; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; flex-shrink: 0;
}
.popup-close:hover { background: var(--border); }

/* Carousel */
.popup-carousel-wrap { position: relative; flex-shrink: 0; }
.popup-carousel {
  display: flex; overflow-x: auto;
  scroll-snap-type: x mandatory; scrollbar-width: none;
}
.popup-carousel::-webkit-scrollbar { display: none; }
.carousel-slide { flex-shrink: 0; width: 100%; height: 300px; scroll-snap-align: start; }
.carousel-slide-inner { width: 100%; height: 100%; display: block; }
.c-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.92); border: none; cursor: none;
  font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, opacity 0.15s; z-index: 2;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.c-arrow:hover { background: #fff; }
.c-arrow:disabled { opacity: 0; pointer-events: none; }
#cPrev { left: 12px; } #cNext { right: 12px; }

/* Dots */
.popup-dots { display: flex; gap: 6px; justify-content: center; padding: 10px 0 8px; flex-shrink: 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background 0.2s, transform 0.2s; cursor: none; }
.dot.active { background: var(--ink); transform: scale(1.35); }

/* Desc */
.popup-desc-area { padding: 16px 24px 28px; overflow-y: auto; flex: 1; scrollbar-width: none; }
.popup-desc-area::-webkit-scrollbar { display: none; }
.popup-desc-area p { font-size: 0.86rem; color: var(--mid); line-height: 1.82; }

/* Page load */
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
nav         { animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.05s both; }
.toggle-btn { animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s both; }

@media (max-width: 600px) {
  nav { padding: 14px 20px; }
  .nav-links { gap: 18px; }
}
</style>
</head>
<body>

<div class="cursor" id="cur"></div>

<div class="canvas-wrap" id="canvasWrap">
  <nav>
    <a href="index.html" class="nav-name">Genesis Gonzalez</a>
    <ul class="nav-links">
      <li><a href="index.html#work">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="playground.html" class="active">Fun</a></li>
      <li><a href="https://docs.google.com/document/d/1oeEOG62CRp6in0x2XRff7gzfNeYK_z6iW47piGqvPAo/edit?usp=sharing" target="_blank" class="dim">Resume</a></li>
    </ul>
  </nav>
  <div class="canvas" id="canvas"></div>
</div>

<button class="toggle-btn" id="toggleBtn" onclick="toggleMode()">
  <span id="toggleIcon">⊞</span>
  <span id="toggleLabel">Organize</span>
</button>

<div class="overlay" id="overlay" onclick="if(event.target===this)closePopup()">
  <div class="popup">
    <div class="popup-bar">
      <div>
        <span class="popup-bar-cat" id="pCat"></span>
        <div class="popup-bar-name" id="pName"></div>
      </div>
      <button class="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div class="popup-carousel-wrap">
      <div class="popup-carousel" id="pCarousel"></div>
      <button class="c-arrow" id="cPrev" onclick="carouselStep(-1)">←</button>
      <button class="c-arrow" id="cNext" onclick="carouselStep(1)">→</button>
    </div>
    <div class="popup-dots" id="pDots"></div>
    <div class="popup-desc-area"><p id="pDesc"></p></div>
  </div>
</div>

<script>
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

const PROJECTS = [
  { id:'fiera',    name:'FIERA',        cat:'Brand Identity', g:'linear-gradient(145deg,#f97b3d,#ffd06b)',  w:195, h:240, dx: -40, dy: -30, rot:-14, imgs:4, desc:'A bold, tropical curly hair brand built around confidence and celebration. Designed for women who wear their texture with pride.' },
  { id:'moody',    name:'Moody Mix',    cat:'Brand Identity', g:'linear-gradient(145deg,#1a1a2e,#4a3f6b)', w:175, h:175, dx:  20, dy: -60, rot:  8, imgs:3, desc:'Sarcastic cat food brand starring a grumpy cat mascot. Irreverent copy meets maximalist packaging for the pet owner who gets it.' },
  { id:'boba',     name:'Boba',         cat:'Brand Identity', g:'linear-gradient(145deg,#a78bdc,#f0c4e8)', w:185, h:230, dx:  70, dy:  10, rot: -5, imgs:4, desc:'A playful boba tea brand concept with a character-driven identity and bold, colorful packaging system.' },
  { id:'record',   name:'Record Label', cat:'Brand Identity', g:'linear-gradient(145deg,#2c2c2c,#777)',    w:165, h:165, dx: -90, dy:  40, rot: 12, imgs:3, desc:'An independent record label identity built around texture, contrast, and a lo-fi aesthetic that feels lived-in.' },
  { id:'dogbox',   name:'Dog Box',      cat:'Brand Identity', g:'linear-gradient(145deg,#ffe0b2,#ff8a65)', w:155, h:195, dx:  50, dy: -90, rot: -9, imgs:3, desc:'A monthly dog subscription box brand with a warm, illustrated personality — designed for devoted dog parents.' },
  { id:'matcha',   name:'Matcha',       cat:'Packaging',      g:'linear-gradient(145deg,#c8e6c0,#5a9e5a)', w:215, h:165, dx: -20, dy:  60, rot:  3, imgs:4, desc:'A matcha and tea packaging concept exploring minimal structure with organic, earthy color palettes and hand-drawn details.' },
  { id:'lipgloss', name:'Lip Gloss',    cat:'Packaging',      g:'linear-gradient(145deg,#f7c5d5,#e87da0)', w:170, h:215, dx:  90, dy: -20, rot:-13, imgs:4, desc:'A lip gloss packaging series with a retro-girly energy — bold typography, pink gradients, and maximalist label layouts.' },
  { id:'hotsauce', name:'Hot Sauce',    cat:'Packaging',      g:'linear-gradient(145deg,#c0392b,#f39c12)', w:185, h:185, dx: -60, dy: -80, rot:  7, imgs:4, desc:'A hot sauce label series with fiery illustration and hand-lettered type. Each flavor has its own character and heat level.' },
  { id:'sodas',    name:'Sodas',        cat:'Packaging',      g:'linear-gradient(145deg,#43c6ac,#191654)', w:225, h:165, dx:  10, dy:  80, rot: -3, imgs:4, desc:'A bold artisan soda packaging system with a flavor-forward design language — each can tells its own story.' },
  { id:'skincare', name:'Skincare',     cat:'Packaging',      g:'linear-gradient(145deg,#e8d5c4,#c4a882)', w:165, h:205, dx:-120, dy:  15, rot: 11, imgs:3, desc:'A minimalist skincare packaging line with warm, sandy tones and clean type — soft luxury at an accessible price point.' },
  { id:'sardines', name:'Sardines',     cat:'Packaging',      g:'linear-gradient(145deg,#1e5799,#7db9e8)', w:200, h:160, dx: 130, dy: -45, rot: -7, imgs:3, desc:'An elevated sardine tin rebrand — vintage nautical meets modern European grocery. Beautifully weird on purpose.' },
  { id:'vitamins', name:'Vitamins',     cat:'Packaging',      g:'linear-gradient(145deg,#f8e71c,#f5a623)', w:170, h:170, dx: -35, dy: 115, rot:  5, imgs:3, desc:'A vitamin supplement packaging series with punchy color-coding and illustrated icons — health that actually looks good.' },
  { id:'matches',  name:'Matches',      cat:'Packaging',      g:'linear-gradient(145deg,#37474f,#b0bec5)', w:155, h:195, dx:  85, dy:  95, rot:-11, imgs:3, desc:'A matchbook and match box series inspired by mid-century souvenir design — collectible, illustrated, and tiny.' },
  { id:'books',    name:'Book Covers',  cat:'Editorial',      g:'linear-gradient(145deg,#3d0c02,#c0392b)', w:200, h:165, dx: -85, dy: -55, rot:  9, imgs:4, desc:'A series of book cover redesigns exploring bold type, unexpected color, and cover composition as its own art form.' },
];

let isOrganized = false;
let currentProject = null;
let currentSlide   = 0;

const canvas     = document.getElementById('canvas');
const canvasWrap = document.getElementById('canvasWrap');

// Build cards
PROJECTS.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${p.id}`;
  card.style.cssText = `width:${p.w}px;height:${p.h}px;opacity:0;z-index:${i+1}`;
  card.innerHTML = `<div class="card-face" style="background:${p.g}"></div>`;

  // Drag vs click tracking
  let dragging = false, startX, startY;
  card.addEventListener('click', e => {
    if (isOrganized) openPopup(p.id);
  });
  card.addEventListener('mousedown', e => {
    if (isOrganized) return; // no drag in grid mode
    e.stopPropagation();
    dragging = false;
    startX = e.clientX; startY = e.clientY;
    card.classList.add('is-dragging');
    card.style.zIndex = 999;
  });
  document.addEventListener('mousemove', e => {
    if (!card.classList.contains('is-dragging')) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragging = true;
    const m = new DOMMatrix(getComputedStyle(card).transform);
    const rot = isOrganized ? 0 : p.rot;
    card.style.transform = `translate(${m.m41 + e.movementX}px,${m.m42 + e.movementY}px) rotate(${rot}deg)`;
  });
  document.addEventListener('mouseup', () => {
    if (!card.classList.contains('is-dragging')) return;
    card.classList.remove('is-dragging');
    card.style.zIndex = i + 1;
    if (!dragging) openPopup(p.id);
  });

  canvas.appendChild(card);
});

// Scatter
function scatter(animate) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  canvasWrap.classList.remove('grid-mode');
  document.body.classList.remove('grid-mode');
  canvas.style.height = '100vh';

  PROJECTS.forEach((p, i) => {
    const card = document.getElementById(`card-${p.id}`);
    card.style.width  = p.w + 'px';
    card.style.height = p.h + 'px';
    const tx = cx + p.dx - p.w / 2;
    const ty = cy + p.dy - p.h / 2;

    if (animate) {
      card.style.transition = 'none';
      card.style.transform  = `translate(${tx}px,${ty - window.innerHeight}px) rotate(${p.rot}deg)`;
      card.style.opacity    = '0';
      requestAnimationFrame(() => {
        setTimeout(() => {
          card.style.transition = '';
          card.style.transform  = `translate(${tx}px,${ty}px) rotate(${p.rot}deg)`;
          card.style.opacity    = '1';
        }, 80 + i * 58);
      });
    } else {
      card.style.transform = `translate(${tx}px,${ty}px) rotate(${p.rot}deg)`;
      card.style.opacity   = '1';
    }
  });
}

// Organize into masonry
function organize() {
  const vw      = window.innerWidth;
  const pad     = Math.max(48, vw * 0.04);
  const gutter  = 14;
  const navH    = 92;
  const cols    = vw > 1100 ? 4 : vw > 750 ? 3 : 2;
  const colW    = Math.floor((vw - pad * 2 - gutter * (cols - 1)) / cols);
  const colH    = new Array(cols).fill(navH + 24);
  let maxH = 0;

  PROJECTS.forEach(p => {
    const card    = document.getElementById(`card-${p.id}`);
    const scale   = colW / p.w;
    const scaledH = Math.round(p.h * scale);
    const col     = colH.indexOf(Math.min(...colH));
    const x = pad + col * (colW + gutter);
    const y = colH[col];

    card.style.width  = colW + 'px';
    card.style.height = scaledH + 'px';
    card.style.transform = `translate(${x}px,${y}px) rotate(0deg)`;
    colH[col] += scaledH + gutter;
    maxH = Math.max(maxH, colH[col]);
  });

  canvas.style.height = maxH + 80 + 'px';
  canvasWrap.classList.add('grid-mode');
  document.body.classList.add('grid-mode');
}

function toggleMode() {
  isOrganized = !isOrganized;
  document.getElementById('toggleIcon').textContent  = isOrganized ? '⊟' : '⊞';
  document.getElementById('toggleLabel').textContent = isOrganized ? 'Scatter' : 'Organize';
  isOrganized ? organize() : scatter(false);
}

// Init
scatter(true);
window.addEventListener('resize', () => isOrganized ? organize() : scatter(false));

// ── POPUP ──
function openPopup(id) {
  const p = PROJECTS.find(x => x.id === id);
  if (!p) return;
  currentProject = p;
  currentSlide   = 0;

  document.getElementById('pCat').textContent  = p.cat;
  document.getElementById('pName').textContent = p.name;
  document.getElementById('pDesc').textContent = p.desc;

  // Slides — each a slightly different brightness so they feel like real images
  const carousel = document.getElementById('pCarousel');
  carousel.innerHTML = '';
  const brightnesses = [1, 0.88, 0.76, 0.65];
  for (let i = 0; i < p.imgs; i++) {
    const slide = document.createElement('div');
    slide.className = 'carousel-slide';
    slide.innerHTML = `<div class="carousel-slide-inner" style="background:${p.g};filter:brightness(${brightnesses[i] ?? 0.6})"></div>`;
    carousel.appendChild(slide);
  }
  carousel.scrollTo({ left: 0, behavior: 'instant' });

  // Dots
  const dots = document.getElementById('pDots');
  dots.innerHTML = '';
  for (let i = 0; i < p.imgs; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    const idx = i;
    d.onclick = () => { currentSlide = idx; carousel.scrollTo({ left: idx * carousel.offsetWidth, behavior: 'smooth' }); syncUI(); };
    dots.appendChild(d);
  }

  syncUI();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePopup() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function carouselStep(dir) {
  if (!currentProject) return;
  const next = currentSlide + dir;
  if (next < 0 || next >= currentProject.imgs) return;
  currentSlide = next;
  const c = document.getElementById('pCarousel');
  c.scrollTo({ left: next * c.offsetWidth, behavior: 'smooth' });
  syncUI();
}

function syncUI() {
  if (!currentProject) return;
  document.querySelectorAll('#pDots .dot').forEach((d, i) => d.classList.toggle('active', i === currentSlide));
  document.getElementById('cPrev').disabled = currentSlide === 0;
  document.getElementById('cNext').disabled = currentSlide === currentProject.imgs - 1;
}

document.getElementById('pCarousel').addEventListener('scroll', function() {
  if (!currentProject) return;
  const idx = Math.round(this.scrollLeft / (this.offsetWidth || 1));
  if (idx !== currentSlide && idx >= 0 && idx < currentProject.imgs) { currentSlide = idx; syncUI(); }
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('overlay').classList.contains('open')) return;
  if (e.key === 'Escape')     closePopup();
  if (e.key === 'ArrowLeft')  carouselStep(-1);
  if (e.key === 'ArrowRight') carouselStep(1);
});

let touchX = 0;
document.getElementById('pCarousel').addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
document.getElementById('pCarousel').addEventListener('touchend',   e => {
  if (Math.abs(e.changedTouches[0].clientX - touchX) > 50)
    carouselStep(e.changedTouches[0].clientX < touchX ? 1 : -1);
});
</script>
</body>
</html>
